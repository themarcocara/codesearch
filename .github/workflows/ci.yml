name: CI

on:
  push:
    branches: [main, master, develop, "feature/**", "features/**"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - run: cargo test --lib -- --nocapture
      - run: cargo test --test '*' -- --nocapture --skip ignore
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings

  test-windows:
    runs-on: windows-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib -- --nocapture
      - run: cargo test --test '*' -- --nocapture --skip ignore

  csharp-integration-tests:
    runs-on: ubuntu-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'
      - name: Build scip-csharp helper (self-contained single-file)
        run: |
          cd helpers/csharp
          dotnet publish scip-csharp.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0
      # pin@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run C# integration tests
        run: |
          export CODESEARCH_SCIP_CSHARP="$PWD/helpers/csharp/bin/Release/net10.0/scip-csharp"
          cargo test --features csharp_helper_integration -- --nocapture

  haxe-integration-tests:
    runs-on: ubuntu-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # Fetch only the Haxe compiler binary + its std library from Kode/Kha's
      # vendored per-platform SDK repo (Kode/kha uses this exact SDK, not a
      # system Haxe install -- see HAXE_KHA_CI_INTEGRATION_HANDOFF.md). A full
      # clone of that repo is ~110MB and includes .NET/Java target libs this
      # job doesn't need; `--filter=blob:none --sparse` + `sparse-checkout set
      # std` fetches only the blobs actually checked out (~57MB: haxe + std +
      # a few small top-level extras that cone mode always includes).
      #
      # Pinned to a specific commit, not a floating branch: KhaTools_linux_x64
      # is updated in place whenever Kha bumps its Haxe version, so tracking
      # `main` risks silently drifting to a different Haxe version than this
      # job was validated against. To bump this pin deliberately, resolve the
      # new SHA via `git ls-tree <kha-commit> Tools/linux_x64` against the
      # Kha version you want to track.
      - name: Fetch Haxe SDK (Kode/KhaTools_linux_x64, haxe + std only)
        run: |
          # --no-checkout, then fetch the pinned SHA explicitly and check
          # that out (rather than `clone --depth 1` + `checkout <sha>`):
          # a plain --depth 1 clone only fetches the CURRENT tip of the
          # remote's default branch, and KhaTools_linux_x64's main is
          # updated in place whenever Kha bumps its Haxe version -- once
          # this pinned commit is no longer that tip, `checkout <sha>`
          # would fail with "reference is not a tree" (verified: this
          # exact failure mode was caught by testing the naive recipe
          # against the real repo before shipping this job).
          git clone --filter=blob:none --sparse --no-checkout \
            https://github.com/Kode/KhaTools_linux_x64.git haxe-sdk
          cd haxe-sdk
          git fetch --depth 1 origin 3e82425713f4508c275174597e52ad9c10b4319e
          git checkout FETCH_HEAD
          git sparse-checkout set std
          chmod +x haxe
          ./haxe --version
      # pin@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Haxe integration tests
        run: |
          # HAXE_STD_PATH deliberately not set here -- HaxeSymbolIndexer
          # auto-detects the sibling std/ next to the resolved haxe binary
          # (see sibling_std_dir in src/symbols/haxe.rs) and sets it itself,
          # exactly like Kha's own khamake build tool does. This job doubles
          # as that fix's regression test: haxe-sdk/haxe and haxe-sdk/std are
          # colocated exactly like a real Kha install, so if auto-detection
          # ever breaks, these tests fail here.
          #
          # Scoped to just this one integration test binary (--test
          # symbols_haxe_test), not a bare `cargo test` -- a bare invocation
          # also runs the full --lib unit test suite (everything under
          # src/), which is unrelated to Haxe and already covered by the
          # test-linux job. Running it here too is redundant AND was
          # observed to cause a spurious failure: adding this job's own
          # Haxe tests increases the total test count cargo test's default
          # parallel harness schedules across the whole binary, and that
          # extra concurrency was enough to trip an unrelated, pre-existing
          # timing-sensitive LMDB open/close race in
          # serve::tests::missing_db_not_cached_as_conflicted (nothing in
          # this PR touches src/serve/mod.rs or the LMDB registry it
          # depends on -- same test, same assertion, passed on the
          # immediately preceding commit with no changes to that code
          # path). Narrowing this job to only the Haxe-specific test target
          # avoids re-running that unrelated, already-covered, and
          # apparently contention-sensitive suite altogether.
          export CODESEARCH_HAXE="$PWD/haxe-sdk/haxe"
          cargo test --features haxe_helper_integration --test symbols_haxe_test -- --nocapture
