name: CI

on:
  push:
    branches: [main, develop, "feature/**", "features/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@v1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - run: cargo test --lib -- --nocapture
      - run: cargo test --test '*' -- --nocapture --skip ignore
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings

  test-windows:
    runs-on: windows-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@v1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib -- --nocapture
      - run: cargo test --test '*' -- --nocapture --skip ignore

  csharp-integration-tests:
    runs-on: ubuntu-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin@v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'
      - name: Build scip-csharp helper (self-contained single-file)
        run: |
          cd helpers/csharp
          dotnet publish scip-csharp.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0
      # pin@v1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      # pin@v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run C# integration tests
        run: |
          export CODESEARCH_SCIP_CSHARP="$PWD/helpers/csharp/bin/Release/net10.0/scip-csharp"
          cargo test --features csharp_helper_integration -- --include-ignored --nocapture
