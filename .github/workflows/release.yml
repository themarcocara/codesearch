name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.49)'
        required: true
        type: string
      include_macos:
        description: 'Include macOS build (10x minutes cost)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codesearch-windows-x86_64.zip
            artifact_csharp: codesearch-windows-x86_64-with-csharp.zip
            dotnet_rid: win-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codesearch-linux-x86_64.tar.gz
            artifact_csharp: codesearch-linux-x86_64-with-csharp.tar.gz
            dotnet_rid: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        # pin@v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        # pin@v3
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev pkg-config

      - name: Cache cargo
        # pin@v4
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_DIR: target

      - name: Setup .NET
        # pin@v4
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'

      - name: Publish C# helper (self-contained single-file)
        run: dotnet publish helpers/csharp -c Release -r ${{ matrix.dotnet_rid }} --self-contained -p:PublishSingleFile=true -o helpers-publish

      - name: Package kale (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target\${{ matrix.target }}\release\codesearch.exe -DestinationPath ${{ matrix.artifact }}

      - name: Package kale (Linux)
        if: runner.os == 'Linux'
        run: tar czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release codesearch

      - name: Package with-csharp (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -Path staging\helpers\csharp -ItemType Directory -Force
          Copy-Item target\${{ matrix.target }}\release\codesearch.exe staging\
          Copy-Item -Recurse helpers-publish\* staging\helpers\csharp\
          Compress-Archive -Path staging\* -DestinationPath ${{ matrix.artifact_csharp }}

      - name: Package with-csharp (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging/helpers/csharp
          cp target/${{ matrix.target }}/release/codesearch staging/
          cp -r helpers-publish/* staging/helpers/csharp/
          tar czf ${{ matrix.artifact_csharp }} -C staging .

      - name: Upload kale artifact
        # pin@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload with-csharp artifact
        # pin@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact_csharp }}
          path: ${{ matrix.artifact_csharp }}

  build-macos:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.include_macos)
    runs-on: macos-latest
    steps:
      # pin@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        # pin@v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          targets: aarch64-apple-darwin

      - name: Install protoc
        # pin@v3
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        # pin@v4
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            aarch64-apple-darwin-cargo-

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin
        env:
          CARGO_TARGET_DIR: target

      - name: Setup .NET
        # pin@v4
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'

      - name: Publish C# helper (self-contained single-file)
        run: dotnet publish helpers/csharp -c Release -r osx-arm64 --self-contained -p:PublishSingleFile=true -o helpers-publish

      - name: Package kale
        run: tar czf codesearch-macos-arm64.tar.gz -C target/aarch64-apple-darwin/release codesearch

      - name: Package with-csharp
        run: |
          mkdir -p staging/helpers/csharp
          cp target/aarch64-apple-darwin/release/codesearch staging/
          cp -r helpers-publish/* staging/helpers/csharp/
          tar czf codesearch-macos-arm64-with-csharp.tar.gz -C staging .

      - name: Upload kale artifact
        # pin@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: codesearch-macos-arm64.tar.gz
          path: codesearch-macos-arm64.tar.gz

      - name: Upload with-csharp artifact
        # pin@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: codesearch-macos-arm64-with-csharp.tar.gz
          path: codesearch-macos-arm64-with-csharp.tar.gz

  release:
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        # pin@v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update Release
        # pin@v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: artifacts/*
          generate_release_notes: true
          tag_name: ${{ inputs.version || github.ref_name }}
